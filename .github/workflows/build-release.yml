name: Build Release APK

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set default version
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: echo "VERSION=dev" >> $GITHUB_ENV

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        run: |
          mkdir -p .keystore
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > .keystore/release.keystore

      - name: Create credentials.json
        run: |
          cat > credentials.json << 'CRED_EOF'
          {
            "android": {
              "keystore": {
                "keystorePath": ".keystore/release.keystore",
                "keystorePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.KEY_ALIAS }}",
                "keyPassword": "${{ secrets.KEY_PASSWORD }}"
              }
            }
          }
          CRED_EOF

      - name: Configure Gradle signing
        run: |
          cat > android/keystore.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=../../.keystore/release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

          # Patch build.gradle to use release signing
          cat >> android/app/build.gradle << 'GRADLE_EOF'

          // Release signing config
          def keystorePropertiesFile = rootProject.file("keystore.properties")
          if (keystorePropertiesFile.exists()) {
              def keystoreProperties = new Properties()
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
              android {
                  signingConfigs {
                      release {
                          storeFile file(keystoreProperties['MYAPP_UPLOAD_STORE_FILE'])
                          storePassword keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD']
                          keyAlias keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS']
                          keyPassword keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD']
                      }
                  }
                  buildTypes {
                      release {
                          signingConfig signingConfigs.release
                      }
                  }
              }
          }
          GRADLE_EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             heiltheim-${{ env.VERSION }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: heiltheim-${{ env.VERSION }}
          path: heiltheim-${{ env.VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: heiltheim-${{ env.VERSION }}.apk
          generate_release_notes: true
